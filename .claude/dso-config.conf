# dso-config.conf — Digital Service Orchestra plugin configuration for {{PROJECT_NAME}}
#
# Format: KEY=VALUE (dot-notation for nesting, repeated keys for lists)
# Read by: read-config.sh via grep/cut
# Reference: see plugins/dso/docs/CONFIGURATION-REFERENCE.md in the DSO plugin

version=1.0.0

# Project stack — declared explicitly so DSO does not have to detect.
stack=node-npm

# dso.plugin_root is set by the create-dso-app installer at scaffold time.
# Leave empty here; the installer fills it in.
dso.plugin_root=

# Format hooks — extensions and source dirs for the auto-format hook.
format.extensions=.ts
format.extensions=.tsx
format.extensions=.js
format.extensions=.jsx
format.extensions=.scss
format.source_dirs=src
format.source_dirs=tests

# Commands — invoked by validation, sprint, and review skills.
commands.test=npm test
commands.test_unit=npm test
commands.test_e2e=npm run test:e2e
commands.test_visual=npm run test:visual
commands.lint=npm run lint
commands.format=npm run format
commands.format_check=npm run format:check
commands.build=npm run build
commands.dev=npm run dev

# CI — workflow names checked by ci-status.sh
# ci.fast_gate_job=Fast Gate
# ci.test_ceil_job=Tests
# ci.integration_workflow=Integration Tests

# Test gate — uses fuzzy matching to associate source files with their tests.
test_gate.enabled=true

# Test quality gate — detects anti-patterns in staged test files.
test_quality.enabled=true
test_quality.tool=bash-grep

# Sprint orchestration
orchestration.max_agents=3

# Review tier thresholds (defaults are sensible; override only with cause)
# review.max_resolution_attempts=5

# Worktree isolation — sub-agents work in separate worktrees in parallel batches.
worktree.isolation_enabled=true

# Figma collaboration — disabled by default. Enable if you use Figma for designs.
design.figma_collaboration=false
